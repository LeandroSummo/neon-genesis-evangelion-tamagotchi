; ============================================================
; NEON GENESIS TAMAGOTCHI — M5StickC Plus2
; PlatformIO Configuration
; ============================================================

[env:m5stick-c-plus2]
platform          = espressif32@5.3.0
board             = m5stick-c
framework         = arduino

lib_deps =
    m5stack/M5Unified@^0.1.16
    m5stack/M5GFX@^0.1.16
    bblanchon/ArduinoJson@^7.0.4

monitor_speed     = 115200
upload_speed      = 1500000

board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_M5STICK_C_PLUS2
    -DARDUINO_M5STACK_M5STICKC_PLUS2
    -Os
    -I src
    -std=gnu++17
    -Wno-unused-variable
    -Wno-unused-function

build_unflags =
    -std=gnu++11
